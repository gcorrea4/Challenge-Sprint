<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario</title>
    
    <link rel="stylesheet" href="../css/formulario.css">
     <script src="../js/script.js" defer></script>
</head>
<body>

    <header>
        <a href="/index.html">Inicio</a>
        <a href="/assets/page/faq.html">FAQ</a> 
        <a href= "/assets/page/quem-somos.html">Quem Somos</a> 
        <a href="/assets/page/sobre.html">Sobre</a> 
        <a href="/assets/page/premios-tdb.html">Reconhecimentos</a> 
        <a href="/assets/page/turma-do-bem.html">TDB</a>
        <a href="/assets/page/contato.html" class="btn-destaque">Contato</a>  
        </nav>
    </header>

    <main>
        
        <div class="forma-container">
            <h2>Formulário de Contato</h2>
            <p>Envie-nos uma mensagem para saber mais.</p>
            
            <div id="mensagemsucesso" class="mensagem-sucesso">
                Mensagem enviada com sucesso!
            </div>

            <form id="formaContato">
                <div class="forma-grupo">
                    <label for="nome">Nome:</label>
                    <input type="text" id="nome" name="nome">
                    <span class="error-message" id="nomeError"></span>
                </div>
                
                <div class="forma-grupo">
                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email">
                    <span class="error-message" id="emailError"></span>
                </div>
                
                <div class="forma-grupo">
                    <label for="assunto">Assunto:</label>
                    <input type="text" id="assunto" name="assunto">
                </div>
                
                <div class="forma-grupo">
                    <label for="mensagem">Mensagem:</label>
                    <textarea id="mensagem" name="mensagem" rows="6"></textarea>
                    <span class="mensagem-erro" id="mensagemErro"></span>
                </div>
                
                <div class="forma-grupo">
                    <button type="submit">Enviar Mensagem</button>
                </div>
            </form>
        </div>
        
    </main>


</body>
</html>
