<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro | Turma do Bem</title>
    <link rel="stylesheet" href="../css/index.css"> 
    <link rel="stylesheet" href="../css/cadastro.css">
    <script src="../js/cadastro.js" defer></script>
    
</head>
<body>

    <header class="menu-global">
        <h1>Turma do Bem</h1>
        </header>

    <main class="main-cadastro">
        <div class="cadastro-card">
            <div class="cadastro-header">
                <h2>Crie sua Conta</h2>
                <p>Faça parte da nossa rede e ajude a transformar sorrisos.</p>
            </div>

            <div id="msg-retorno" style="display: none;"></div>

            <form id="formCadastro">
                <div class="input-group">
                    <label for="cad-nome">Usuário</label>
                    <input type="text" id="cad-nome" placeholder="Digite seu nome" required>
                </div>
                
                <div class="input-group">
                    <label for="cad-email">E-mail</label>
                    <input type="email" id="cad-email" placeholder="exemplo@email.com" required>
                </div>

                <div class="input-duplo">
                    <div class="input-group">
                        <label for="cad-senha">Senha</label>
                        <input type="password" id="cad-senha">
                    </div>
                    <div class="input-group">
                        <label for="cad-confirma">Confirmar Senha</label>
                        <input type="password" id="cad-confirma">
                    </div>
                </div>

                <button type="submit" class="botao-acao efeito-brilho w-100">Cadastrar Agora</button>
            </form>

            <div class="cadastro-footer">
                <p>Já tem uma conta? <a href="/assets/page/login.html">Faça login</a></p>
            </div>
        </div>
    </main>
    
    </body>
</html>
